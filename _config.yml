title: SunoForge Docs
description: >-
  Documentation for SunoForge — a browser-based AI song creation tool
  that uses AI to generate lyrics, chord progressions, and production guidance.
baseurl: ""
url: "https://docs.sunoforge.app"

theme: jekyll-text-theme

text_skin: dark
highlight_theme: tomorrow-night

lang: en
timezone: UTC

repository: ratava/SunoForge-docs

author:
  type: organization
  name: SunoForge
  avatar: "https://raw.githubusercontent.com/ratava/SunoForge/main/images/logo.webp"
  bio: "Browser-based AI song creation tool"
  links:
    github: ratava

license: CC-BY-NC-4.0

toc:
  selectors: "h1,h2,h3"

permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - README.md
  - vendor/

search:
  provider: default

sources: unpkg
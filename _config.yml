title: SunoForge Docs
description: >-
  Documentation for SunoForge — a browser-based AI song creation tool
  that uses AI to generate lyrics, chord progressions, and production guidance.
baseurl: ""
url: "https://docs.sunoforge.app"

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: dark

lang: en
timezone: UTC

repository: ratava/SunoForge-docs

author:
  name: SunoForge
  avatar: "https://raw.githubusercontent.com/ratava/SunoForge/main/images/logo.webp"
  bio: "Browser-based AI song creation tool"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ratava"

logo: "https://raw.githubusercontent.com/ratava/SunoForge/main/images/logo.webp"

search: true
search_full_content: true

permalink: pretty

plugins:
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - README.md
  - vendor/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      toc: true
      toc_sticky: true
      sidebar:
        nav: "docs"